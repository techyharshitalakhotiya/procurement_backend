version: '3.8'

services:
  db:
    image: postgres:15
    container_name: procurement_db
    environment:
      POSTGRES_USER: procurement
      POSTGRES_PASSWORD: procurement123
      POSTGRES_DB: procurement_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: procurement_app
    ports:
      - '3000:3000'
    env_file:
      - .env
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://procurement:procurement123@db:5432/procurement_db

volumes:
  postgres_data: